<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}danal-research{% endblock %}</title>
<style>
:root {
  --blue: #1565C0; --light-blue: #E3F2FD;
  --green: #2E7D32; --light-green: #E8F5E9;
  --orange: #E65100; --light-orange: #FFF3E0;
  --grey: #546E7A; --bg: #F5F7FA;
  --white: #FFFFFF; --border: #DEE2E6;
  --text: #212529; --muted: #6C757D;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', 'Noto Sans KR', -apple-system, sans-serif;
  background: var(--bg); color: var(--text); line-height: 1.7;
}
header {
  background: linear-gradient(135deg, var(--blue) 0%, #0D47A1 100%);
  color: white; padding: 28px 48px 24px;
}
header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
header p { font-size: 14px; opacity: 0.85; margin-top: 4px; }
header a { color: rgba(255,255,255,0.9); text-decoration: none; }
header a:hover { text-decoration: underline; }
.badges { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
.badge {
  background: rgba(255,255,255,0.18); border: 1px solid rgba(255,255,255,0.35);
  padding: 2px 10px; border-radius: 20px; font-size: 11px;
}
main { max-width: 960px; margin: 0 auto; padding: 32px 24px 60px; }

/* tables */
table { border-collapse: collapse; width: 100%; margin: 16px 0; font-size: 14px; }
th { background: var(--blue); color: white; font-weight: 600; text-align: left; padding: 10px 12px; }
td { padding: 8px 12px; border-bottom: 1px solid var(--border); }
tr:hover { background: var(--light-blue); }
tr:nth-child(even) { background: #FAFBFC; }
tr:nth-child(even):hover { background: var(--light-blue); }

/* headings */
h1 { font-size: 22px; color: var(--blue); margin: 32px 0 16px; border-bottom: 2px solid var(--blue); padding-bottom: 8px; }
h2 { font-size: 17px; font-weight: 700; color: var(--blue); border-left: 4px solid var(--blue); padding-left: 12px; margin: 28px 0 12px; }
h3 { font-size: 14px; font-weight: 600; color: var(--grey); margin: 20px 0 8px; }

/* content */
p { margin: 8px 0; font-size: 14px; }
ul, ol { margin: 8px 0 8px 20px; font-size: 14px; }
li { margin: 4px 0; }
blockquote {
  border-left: 4px solid var(--blue); background: var(--light-blue);
  padding: 12px 16px; margin: 16px 0; border-radius: 0 8px 8px 0; font-size: 14px;
}
strong { color: var(--text); }
code { background: #F1F3F5; padding: 1px 5px; border-radius: 3px; font-size: 13px; font-family: 'Consolas', monospace; }
hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
img { max-width: 100%; height: auto; border-radius: 8px; margin: 12px 0; border: 1px solid var(--border); }

/* cards */
.card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; margin: 16px 0; }
.card {
  background: var(--white); border: 1px solid var(--border); border-radius: 12px;
  padding: 20px; transition: box-shadow 0.2s;
}
.card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
.card h3 { margin: 0 0 8px; color: var(--blue); font-size: 15px; text-transform: none; letter-spacing: 0; }
.card p { font-size: 13px; color: var(--muted); margin: 0; }
.card a { text-decoration: none; color: inherit; display: block; }
.card .tag { font-size: 11px; background: var(--light-blue); color: var(--blue); padding: 2px 8px; border-radius: 10px; display: inline-block; margin-top: 8px; }

/* footer */
footer { text-align: center; padding: 24px; font-size: 12px; color: var(--muted); border-top: 1px solid var(--border); }
footer a { color: var(--blue); text-decoration: none; }

/* nav breadcrumb */
.breadcrumb { margin-bottom: 20px; font-size: 13px; color: var(--muted); }
.breadcrumb a { color: var(--blue); text-decoration: none; }

@media print {
  header { background: white; color: var(--text); padding: 12px 0; }
  .badges, footer, .breadcrumb { display: none; }
  main { padding: 0; }
}
@media (max-width: 700px) {
  header { padding: 20px 16px; }
  main { padding: 16px; }
  .card-grid { grid-template-columns: 1fr; }
}
{% block extra_css %}{% endblock %}
</style>
</head>
<body>
{% block header %}
<header>
  <h1>danal-research</h1>
  <p>Fintech & Digital Asset Investment Research Automation</p>
</header>
{% endblock %}
<main>
{% block content %}{% endblock %}
</main>
<footer>
  Source: FRED, CoinGecko, SEC EDGAR | Built with Python
  {% block footer_extra %}{% endblock %}
</footer>
</body>
</html>
